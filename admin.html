<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👑 ADMIN SPACEMAN</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { font-family: 'Press Start 2P', sans-serif; background: #0a0a1f; color: white; text-align:center; margin:0; padding:15px; }
        .container { max-width: 700px; margin:auto; background:#1a1a2e; padding:20px; border:4px solid #ef4444; border-radius:15px; }
        button { width:100%; padding:16px; margin:10px 0; font-size:18px; border:none; border-radius:50px; cursor:pointer; font-weight:bold; }
        .btn-green { background:#22c55e; color:black; }
        .btn-red { background:#ef4444; color:white; }
        .btn-blue { background:#22d3ee; color:black; }
        .btn-yellow { background:#facc15; color:black; }
        .btn-gray { background:#64748b; color:white; }
        input, select { width:90%; padding:12px; margin:8px 0; background:#334155; color:white; border:none; border-radius:8px; }
        .withdraw-list { text-align: left; max-height: 400px; overflow-y: auto; background: #0f1629; padding: 15px; border-radius: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>👑 ADMIN CONTROL</h1>
    <p><strong>SPACEMAN ADMIN PANEL</strong></p>

    <h3>Tambah Saldo User</h3>
    <input type="text" id="targetUser" placeholder="Username">
    <input type="number" id="addAmount" placeholder="Jumlah Saldo">
    <button onclick="addSaldo()" class="btn-green">💰 TAMBAH SALDO</button>

    <h3>Force Crash</h3>
    <input type="text" id="forceUser" placeholder="Username">
    <input type="number" id="forceMult" value="3.5" step="0.1" placeholder="Crash di berapa x">
    <button onclick="setForceCrash()" class="btn-red">💥 SET FORCE CRASH</button>
    <button onclick="resetForceCrash()" class="btn-gray">🔄 RESET FORCE CRASH</button>

    <h3>Lihat Semua User</h3>
    <button onclick="lihatSemuaUser()" class="btn-blue">👥 LIHAT SEMUA USER</button>

    <h3>Permintaan Penarikan</h3>
    <button onclick="lihatWithdrawals()" class="btn-yellow">💸 LIHAT & PROSES TARIK SALDO</button>

    <div id="withdrawList" class="withdraw-list" style="display:none;"></div>

    <button onclick="backToGame()" class="btn-gray">← KEMBALI KE GAME</button>
</div>

<script>
    let users = {};
    let withdrawals = [];

    function loadData() {
        users = JSON.parse(localStorage.getItem('spacemanUsers')) || {};
        withdrawals = JSON.parse(localStorage.getItem('spacemanWithdrawals')) || [];
    }

    function saveData() {
        localStorage.setItem('spacemanUsers', JSON.stringify(users));
        localStorage.setItem('spacemanWithdrawals', JSON.stringify(withdrawals));
    }

    function addSaldo() {
        loadData();
        const user = document.getElementById('targetUser').value.trim().toLowerCase();
        const amount = parseInt(document.getElementById('addAmount').value);
        if (!user || !amount) return alert("Isi username dan jumlah!");
        
        if (!users[user]) users[user] = {password: "123456", saldo: 0};
        users[user].saldo = (users[user].saldo || 0) + amount;
        saveData();
        alert(`✅ Berhasil tambah Rp ${amount.toLocaleString('id-ID')} ke ${user}`);
    }

    function setForceCrash() {
        loadData();
        const user = document.getElementById('forceUser').value.trim().toLowerCase();
        const mult = parseFloat(document.getElementById('forceMult').value);
        if (!user || !mult) return alert("Isi username dan multiplier!");
        
        if (!users[user]) users[user] = {password: "123456", saldo: 0};
        users[user].forceCrash = mult;
        saveData();
        alert(`💥 Force crash ${user} diatur ke ${mult}x`);
    }

    function resetForceCrash() {
        loadData();
        const user = document.getElementById('forceUser').value.trim().toLowerCase();
        if (!user) return alert("Masukkan username!");
        if (users[user]) {
            delete users[user].forceCrash;
            saveData();
            alert(`✅ Force crash ${user} direset`);
        }
    }

    function lihatSemuaUser() {
        loadData();
        let text = "DAFTAR USER:\n\n";
        Object.keys(users).forEach(u => {
            const force = users[u].forceCrash ? ` (Force: ${users[u].forceCrash}x)` : "";
            text += `${u} → Rp \( {(users[u].saldo || 0).toLocaleString('id-ID')} \){force}\n`;
        });
        alert(text || "Belum ada user");
    }

    function lihatWithdrawals() {
        loadData();
        const container = document.getElementById('withdrawList');
        
        if (withdrawals.length === 0) {
            container.innerHTML = "<p>Belum ada permintaan penarikan.</p>";
            container.style.display = 'block';
            return;
        }

        let html = `<h3>Permintaan Penarikan (${withdrawals.length})</h3>`;
        
        withdrawals.forEach((w, i) => {
            if (w.status === "Pending") {
                html += `
                    <div style="border:2px solid #facc15; padding:10px; margin:10px 0; border-radius:8px;">
                        <strong>${w.username}</strong> - Rp ${w.amount.toLocaleString('id-ID')}<br>
                        ${w.ewallet} | ${w.number}<br>
                        <small>${w.date}</small><br><br>
                        <button onclick="approveWithdraw(${i})" style="background:#22c55e; width:48%;">✅ APPROVE</button>
                        <button onclick="rejectWithdraw(${i})" style="background:#ef4444; width:48%;">❌ REJECT</button>
                    </div>`;
            }
        });

        container.innerHTML = html;
        container.style.display = 'block';
    }

    function approveWithdraw(index) {
        loadData();
        const wd = withdrawals[index];
        if (!wd || wd.status !== "Pending") return;

        if (!users[wd.username]) users[wd.username] = {saldo: 0};
        
        wd.status = "Approved";
        saveData();
        alert(`✅ Penarikan Rp ${wd.amount.toLocaleString('id-ID')} oleh ${wd.username} telah DISETUJUI`);
        lihatWithdrawals(); // refresh list
    }

    function rejectWithdraw(index) {
        loadData();
        const wd = withdrawals[index];
        if (!wd || wd.status !== "Pending") return;

        // Kembalikan saldo ke player
        if (!users[wd.username]) users[wd.username] = {saldo: 0};
        users[wd.username].saldo += wd.amount;

        wd.status = "Rejected";
        saveData();
        alert(`❌ Penarikan Rp ${wd.amount.toLocaleString('id-ID')} oleh ${wd.username} telah DITOLAK\nSaldo dikembalikan ke player.`);
        lihatWithdrawals(); // refresh list
    }

    function backToGame() {
        window.location.href = "index.html";
    }

    window.onload = function() {
        loadData();
    };
</script>
</body>
</html>
